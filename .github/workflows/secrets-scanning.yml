# This file is generated by the Terraform module 'github-repository'.
# It is not intended to be edited manually.
name: TruffleHog Secret Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  TruffleHogSecretScan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.7
        with:
          extra_args: --only-verified
