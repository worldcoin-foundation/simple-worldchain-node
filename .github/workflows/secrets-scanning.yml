# This file is generated by the Terraform module 'github-repository'.
# It is not intended to be edited manually.
name: TruffleHog Secret Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  TruffleHogSecretScan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          extra_args: --only-verified
